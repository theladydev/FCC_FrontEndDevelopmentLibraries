<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography Exhibit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gradient-to-br from-stone-100 via-amber-50 to-slate-100 p-8 min-h-screen flex items-center justify-center">
    <div class="main-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto">
        <div class="card rounded-2xl p-6 bg-white/80 backdrop-blur-sm shadow-xl hover:shadow-2xl transition-all duration-300 hover:-translate-y-1 border border-amber-200/50">
            <img src="https://cdn.freecodecamp.org/curriculum/labs/colosseo.jpg" alt="Colosseum in Rome" class="rounded-xl w-full h-52 object-cover shadow-md hover:shadow-lg transition-shadow" />
            <h3 class="subheading font-semibold text-2xl mt-4 text-stone-800 tracking-tight">Colosseum</h3>
            <p class="description text-base text-stone-600 leading-relaxed">Ancient amphitheater in the heart of Rome, Italy.</p>
        </div>
        <div class="card rounded-2xl p-6 bg-white/80 backdrop-blur-sm shadow-xl hover:shadow-2xl transition-all duration-300 hover:-translate-y-1 border border-amber-200/50">
            <img src="https://cdn.freecodecamp.org/curriculum/labs/alps.jpg" alt="Alps mountain range" class="rounded-xl w-full h-52 object-cover shadow-md hover:shadow-lg transition-shadow" />
            <h3 class="subheading font-semibold text-2xl mt-4 text-stone-800 tracking-tight">Alps</h3>
            <p class="description text-base text-stone-600 leading-relaxed">Majestic mountain range spanning across Europe.</p>
        </div>
        <div class="card rounded-2xl p-6 bg-white/80 backdrop-blur-sm shadow-xl hover:shadow-2xl transition-all duration-300 hover:-translate-y-1 border border-amber-200/50">
            <img src="https://cdn.freecodecamp.org/curriculum/labs/sea.jpg" alt="Ocean sea view" class="rounded-xl w-full h-52 object-cover shadow-md hover:shadow-lg transition-shadow" />
            <h3 class="subheading font-semibold text-2xl mt-4 text-stone-800 tracking-tight">Sea</h3>
            <p class="description text-base text-stone-600 leading-relaxed">Vast and serene ocean waters, peaceful and endless.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
